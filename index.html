<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>92 Hoover - Mapa</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body, #map { height:100%; margin:0; }
#map, .leaflet-container{ background:#1f73b7; }

/* HUD abajo izquierda */
.hud-bottom{
  position:absolute; left:14px; bottom:14px; z-index:3000;
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}
.pill{
  display:flex; align-items:center; gap:8px;
  padding:10px 12px; border-radius:8px;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.10);
  box-shadow: 0 10px 24px rgba(0,0,0,.35);
  color:#fff;
}
.pill input{
  border:0; outline:0; background:transparent; color:#fff;
}
.pill .label{ font-size:13px; opacity:.9; white-space:nowrap; }

.layerBtns{
  display:flex; gap:8px; align-items:center; padding:10px;
}
.layerBtn{
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.55);
  color:#fff;
  border-radius:8px;
  padding:8px 12px;
  cursor:pointer;
  font-size:12px;
}
.layerBtn.active{
  background:rgba(255,255,255,.14);
}

.brand-logo{
  position:absolute; right:18px; top:70px;
  width:200px;
  pointer-events:none;
}

.popup-img{
  width:260px;
  border-radius:10px;
  margin-top:8px;
  cursor:pointer;
}

#imageModal{
  display:none;
  position:fixed;
  z-index:5000;
  left:0;top:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center; align-items:center;
}
#imageModal img{
  max-width:90%; max-height:90%;
}
</style>
</head>

<body>

<div class="hud-bottom">
  <div class="pill">
    <img src="origen.png" style="width:22px;height:22px;">
    <span class="label">Búsqueda por nombre</span>
    <input id="searchInput" type="text">
  </div>
</div>

<img src="origen.png" class="brand-logo">

<div id="map"></div>

<div id="imageModal" onclick="this.style.display='none'">
  <img id="modalImg">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, doc,
  deleteDoc, updateDoc, onSnapshot,
  serverTimestamp, query, orderBy
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
import {
  getAuth, onAuthStateChanged,
  GoogleAuthProvider, signInWithPopup, signOut
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBBBfkurAGsebtIfRJTTejXkPQYmxD-Lew",
  authDomain: "puntos-origen.firebaseapp.com",
  projectId: "puntos-origen",
  storageBucket: "puntos-origen.firebasestorage.app",
  messagingSenderId: "791814298746",
  appId: "1:791814298746:web:9ed731d8288e70292dafc3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* MAPA */
const map = L.map("map", {
  crs: L.CRS.Simple,
  minZoom: 0,
  maxZoom: 7
});

const roadLayer = L.tileLayer("tiles/road/{z}/{x}/{y}.jpg", {
  tileSize: 256,
  noWrap: true
});

const atlasLayer = L.tileLayer("tiles/atlas/{z}/{x}/{y}.jpg", {
  tileSize: 256,
  noWrap: true
});

const satelliteLayer = L.tileLayer("tiles/satellite/{z}/{x}/{y}.jpg", {
  tileSize: 256,
  noWrap: true
});

roadLayer.addTo(map);
let activeBase = "Road";

/* Bounds reales */
const tileSize = 256;
const size = tileSize * Math.pow(2, 7);

const southWest = map.unproject([0, size], 7);
const northEast = map.unproject([size, 0], 7);
const bounds = new L.LatLngBounds(southWest, northEast);

map.setMaxBounds(bounds);
map.fitBounds(bounds);

/* BOTONES */
const control = L.control({position:"bottomright"});
control.onAdd = function(){
  const div = L.DomUtil.create("div","layerBtns");
  div.innerHTML = `
    <div class="layerBtn active" data-layer="Road">Road</div>
    <div class="layerBtn" data-layer="Atlas">Atlas</div>
    <div class="layerBtn" data-layer="Satellite">Satellite</div>
  `;
  div.querySelectorAll(".layerBtn").forEach(btn=>{
    btn.onclick = ()=>{
      const name = btn.dataset.layer;
      switchBase(name);
    }
  });
  return div;
}
control.addTo(map);

function switchBase(name){
  if(map.hasLayer(roadLayer)) map.removeLayer(roadLayer);
  if(map.hasLayer(atlasLayer)) map.removeLayer(atlasLayer);
  if(map.hasLayer(satelliteLayer)) map.removeLayer(satelliteLayer);

  if(name==="Road") roadLayer.addTo(map);
  if(name==="Atlas") atlasLayer.addTo(map);
  if(name==="Satellite") satelliteLayer.addTo(map);

  document.querySelectorAll(".layerBtn").forEach(b=>{
    b.classList.toggle("active", b.dataset.layer===name);
  });
}

/* MARCADORES FIREBASE */
const colRef = collection(db,"markers");
const q = query(colRef,orderBy("createdAt","asc"));

const redIcon = L.icon({
  iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize:[25,41],
  iconAnchor:[12,41]
});

onSnapshot(q,snap=>{
  snap.docChanges().forEach(ch=>{
    const data = ch.doc.data();
    const id = ch.doc.id;

    if(ch.type==="added"){
      const marker = L.marker([data.lat,data.lng],{icon:redIcon}).addTo(map);
      marker.bindPopup(`<b>${data.title}</b><br>${data.desc||""}`);
    }
  });
});

/* CREAR */
map.on("click",async e=>{
  const title=prompt("Título:");
  if(!title) return;
  await addDoc(colRef,{
    title,
    desc:"",
    lat:e.latlng.lat,
    lng:e.latlng.lng,
    createdAt:serverTimestamp()
  });
});
</script>

</body>
</html>
